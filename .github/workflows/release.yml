# Builds and publishes a signed release APK.
#
# Pipeline:
#   build-test → build-release → distribute-firebase  (parallel)
#                              → github-release        (tag push only)
#
# Triggers:
#   - Push of a version tag (v*) — full pipeline + GitHub Release
#   - Manual run (workflow_dispatch) — tests, build, Firebase App Distribution only
#
# Required GitHub secrets:
#   GOOGLE_SERVICES_JSON_BASE64     - Base64-encoded google-services.json
#   FIREBASE_APP_ID                 - Firebase app ID
#   FIREBASE_SERVICE_ACCOUNT_JSON   - Firebase service account key JSON (App Distribution Admin)
#   RELEASE_KEYSTORE_BASE64         - Base64-encoded release keystore
#   RELEASE_KEYSTORE_PASSWORD
#   RELEASE_KEY_ALIAS
#   RELEASE_KEY_PASSWORD
#
# Optional GitHub repository variables:
#   FIREBASE_DISTRIBUTION_GROUPS    - Comma-separated tester groups (default: testers)
#
# Permissions:
#   github-release job requires contents: write (uses GITHUB_TOKEN)
#
# Local manual upload (Firebase App Distribution only):
#   export GOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json
#   export FIREBASE_DISTRIBUTION_GROUPS=testers
#   ./gradlew assembleRelease appDistributionUploadRelease

name: Release & Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      groups:
        description: Comma-separated Firebase tester groups
        required: false
        default: testers
      release_notes:
        description: Release notes shown to testers
        required: false
        default: ''

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Recreate google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Unit tests
        run: ./gradlew test --no-daemon

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: Recreate google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode release keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

  distribute-firebase:
    name: Distribute to Firebase
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v8
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/

      - name: Set distribution metadata
        id: distribution
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "groups=${{ github.event.inputs.groups }}" >> "$GITHUB_OUTPUT"
            if [ -n "${{ github.event.inputs.release_notes }}" ]; then
              echo "notes=${{ github.event.inputs.release_notes }}" >> "$GITHUB_OUTPUT"
            else
              echo "notes=Manual build from ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "groups=${{ vars.FIREBASE_DISTRIBUTION_GROUPS || 'testers' }}" >> "$GITHUB_OUTPUT"
            echo "notes=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ steps.distribution.outputs.groups }}
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ steps.distribution.outputs.notes }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v8
        with:
          name: app-release-apk
          path: dist

      - name: Rename APK
        run: cp dist/app-release.apk "dist/ondori-${{ github.ref_name }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/ondori-${{ github.ref_name }}.apk
          generate_release_notes: true
          prerelease: true