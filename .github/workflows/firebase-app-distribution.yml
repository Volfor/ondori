# Uploads a signed release APK to Firebase App Distribution.
#
# Triggers:
#   - Push of a version tag (v*)
#   - Manual run from Actions tab (workflow_dispatch)
#
# Required GitHub secrets:
#   FIREBASE_SERVICE_ACCOUNT_JSON   - Firebase service account key JSON (App Distribution Admin)
#   RELEASE_KEYSTORE_BASE64         - Base64-encoded release keystore
#   RELEASE_KEYSTORE_PASSWORD
#   RELEASE_KEY_ALIAS
#   RELEASE_KEY_PASSWORD
#
# Optional GitHub repository variables:
#   FIREBASE_DISTRIBUTION_GROUPS     - Comma-separated tester groups (default: testers)
#
# Local manual upload:
#   export GOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json
#   export FIREBASE_DISTRIBUTION_GROUPS=testers
#   ./gradlew assembleRelease appDistributionUploadRelease

name: Firebase App Distribution

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build
        required: false
        default: main
      groups:
        description: Comma-separated Firebase tester groups
        required: false
        default: testers
      release_notes:
        description: Release notes shown to testers
        required: false
        default: ''

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Recreate google-services.json
        env:
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET_JSON }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Set distribution metadata
        id: distribution
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "groups=${{ github.event.inputs.groups }}" >> "$GITHUB_OUTPUT"
            if [ -n "${{ github.event.inputs.release_notes }}" ]; then
              echo "notes=${{ github.event.inputs.release_notes }}" >> "$GITHUB_OUTPUT"
            else
              echo "notes=Manual build from ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "groups=${{ vars.FIREBASE_DISTRIBUTION_GROUPS || 'testers' }}" >> "$GITHUB_OUTPUT"
            echo "notes=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ steps.distribution.outputs.groups }}
          file: app/build/outputs/apk/release/app-release.apk
          releaseNotes: ${{ steps.distribution.outputs.notes }}
